name: CI/CD Pipeline - AWS EC2 Deploy

on:
  push:
    branches: [ main ]

jobs:
  # ─── BUILD & TEST BACKEND ───────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: cd backend && mvn -B clean package -DskipTests=false

  # ─── BUILD & LINT FRONTEND ──────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Dependencies
        run: cd frontend && npm ci

      - name: Build React App
        run: cd frontend && npm run build

  # ─── DEPLOY TO AWS EC2 VIA SSH ──────────────────────────────────────────────
  deploy:
    needs: [build-backend, build-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.AWS_EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.AWS_EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to EC2 via Docker Compose
        run: |
          ssh -i ~/.ssh/id_rsa ubuntu@${{ secrets.AWS_EC2_HOST }} "
            cd ~/ai-farmer || git clone https://github.com/${{ github.repository }}.git ~/ai-farmer
            cd ~/ai-farmer
            git checkout main
            git pull origin main
            
            # Setup .env file
            echo 'MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}' > .env
            echo 'MYSQL_USER=${{ secrets.MYSQL_USER }}' >> .env
            echo 'MYSQL_PASSWORD=${{ secrets.MYSQL_PASSWORD }}' >> .env
            echo 'JWT_SECRET=${{ secrets.JWT_SECRET }}' >> .env
            echo 'GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}' >> .env
            echo 'OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}' >> .env
            echo 'HUGGINGFACE_API_KEY=${{ secrets.HUGGINGFACE_API_KEY }}' >> .env
            echo 'AWS_ACCESS_KEY=${{ secrets.AWS_ACCESS_KEY }}' >> .env
            echo 'AWS_SECRET_KEY=${{ secrets.AWS_SECRET_KEY }}' >> .env
            echo 'AWS_S3_BUCKET=${{ secrets.AWS_S3_BUCKET }}' >> .env
            echo 'AWS_REGION=${{ secrets.AWS_REGION }}' >> .env
            echo 'MAIL_HOST=${{ secrets.MAIL_HOST }}' >> .env
            echo 'MAIL_PORT=${{ secrets.MAIL_PORT }}' >> .env
            echo 'MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}' >> .env
            echo 'MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}' >> .env
            echo 'DATA_GOV_IN_API_KEY=${{ secrets.DATA_GOV_IN_API_KEY }}' >> .env
            
            # Start and rebuild containers
            docker compose down
            docker compose up --build -d
          "
