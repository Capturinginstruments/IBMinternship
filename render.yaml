services:
  # ── Spring Boot Backend Service (packages MySQL + Java application) ─────────
  - type: web
    name: farmer-backend
    runtime: docker
    dockerContext: ./
    dockerfilePath: backend/Dockerfile
    plan: free
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:mysql://localhost:3306/farmer_assistant?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
      - key: SPRING_DATASOURCE_USERNAME
        value: farmer
      - key: SPRING_DATASOURCE_PASSWORD
        value: farmer123
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: "86400000"
      - key: JWT_REFRESH_EXPIRATION
        value: "604800000"
      # Credentials (configured via Render dashboard or environment)
      - key: OPENWEATHER_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: AWS_ACCESS_KEY
        sync: false
      - key: AWS_SECRET_KEY
        sync: false
      - key: AWS_S3_BUCKET
        value: farmer-assistant-images
      - key: AWS_REGION
        value: ap-south-1
      - key: SPRING_MAIL_HOST
        value: smtp.gmail.com
      - key: SPRING_MAIL_PORT
        value: "587"
      - key: SPRING_MAIL_USERNAME
        sync: false
      - key: SPRING_MAIL_PASSWORD
        sync: false
      - key: DATA_GOV_IN_API_KEY
        sync: false

  # ── React Frontend Service ──────────────────────────────────────────────────
  - type: web
    name: farmer-frontend
    runtime: docker
    dockerContext: ./frontend
    dockerfilePath: frontend/Dockerfile
    plan: free
    envVars:
      - key: BACKEND_HOST
        value: http://farmer-backend:8080
